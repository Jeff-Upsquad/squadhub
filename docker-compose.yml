services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: squadhub-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env.production
    environment:
      - NODE_ENV=production
    networks:
      - squadhub

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: squadhub-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - squadhub

networks:
  squadhub:
    driver: bridge
